/* ---------- 접속 표시(presence) + 알림(notifications) ---------- */
window._online=window._online||new Set();
window._presenceAt=window._presenceAt||{};
const ONLINE_WINDOW=150000;  // 마지막 신호 150초 이내면 접속 중
const HEARTBEAT=60000;       // 60초마다 접속 신호 (읽기 절약)

function recomputeOnline(){
  const map=window._presenceAt||{},now=Date.now(),on=new Set();
  Object.keys(map).forEach(id=>{ if(now-(map[id]||0)<ONLINE_WINDOW) on.add(id); });
  if(S&&S.meId) on.add(S.meId);   // 나 자신은 항상 접속 중
  const sig=Array.from(on).sort().join(',');
  const changed=sig!==window._onlineSig; window._onlineSig=sig;
  window._online=on;
  applyPresenceDots();
  // 접속자가 바뀌면 홈탭 '오늘 출석한 멤버' 순서 갱신(접속 중인 사람 왼쪽으로)
  if(changed&&tab==='home') reorderHomeAttendees();
  // 모임 탭 접속 인원수 갱신
  if(tab==='club'){ const co=$('#s-club .club-online'); if(co){ const n=Array.from(on).filter(id=>S.members&&S.members[id]).length; co.textContent='● '+n+'명 접속'; } }
}
function applyPresenceDots(){
  const on=window._online||new Set();
  document.querySelectorAll('.odot[data-uid]').forEach(d=>d.classList.toggle('is-online',on.has(d.getAttribute('data-uid'))));
}
function startPresence(){
  if(!window._fb||window._presenceStarted||!S||!S.meId)return;
  window._presenceStarted=true;
  const {db,roomId}=window._fb;
  const presCol=db.collection('rooms').doc(roomId).collection('presence');
  const beat=()=>{ if(S&&S.meId) presCol.doc(S.meId).set({at:Date.now()},{merge:true}).catch(()=>{}); };
  beat();
  recomputeOnline();   // 내 접속을 즉시 반영(스냅샷 도착 전에도 내 점 표시)
  window._presHB=setInterval(beat,HEARTBEAT);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) beat(); });
  window.addEventListener('focus',beat);
  window.addEventListener('pagehide',()=>{ try{ if(S&&S.meId) presCol.doc(S.meId).set({at:0},{merge:true}); }catch(e){} });
  presCol.onSnapshot(qs=>{
    const map={}; qs.forEach(d=>{ map[d.id]=(d.data()&&d.data().at)||0; });
    window._presenceAt=map; recomputeOnline();
  },e=>console.warn('presence snapshot',e));
  window._presTick=setInterval(recomputeOnline,20000);   // 신호 끊긴 멤버 자동 오프라인 처리
}

/* --- 알림 (Firestore 동기화 · 모든 기기 공통) ---
   [예전] 알림 목록/읽음 상태를 기기별 localStorage에 따로 저장 → PC·모바일 내용이 달랐음.
   [지금] 목록을 따로 저장하지 않고, 이미 동기화돼 있는 글(S.posts)·완독(멤버 책장)에서
          그때그때 계산한다. "마지막으로 알림을 본 시각"(notifSeenTs) 하나만 내 멤버 문서에
          저장하는데, 이 문서는 모든 기기가 함께 보는 값이라 한 기기에서 알림을 열면
          다른 기기의 안읽음 표시도 같이 사라진다. (추가 읽기 비용 거의 없음) */

// 마지막으로 알림을 확인한 시각(ms). 기록이 없으면 0.
function notifSeenTs(){ const m=me(); return (m&&m.notifSeenTs)||0; }

// 지금 보여줄 알림 목록을 데이터에서 바로 계산한다 (저장하지 않음).
function notifEvents(){
  if(!S||!S.meId) return [];
  const meId=S.meId, ev=[];
  // 1) 다른 사람이 올린 새 글
  (S.posts||[]).forEach(p=>{
    if(p&&p.id&&p.authorId!==meId){
      const au=S.members[p.authorId];
      ev.push({id:'p_'+p.id,type:'post',name:au?au.name:'멤버',
               text:(p.text||'').slice(0,60),ts:p.createdAt||0});
    }
  });
  // 2) 다른 사람이 완독한 책
  Object.values(S.members).forEach(m=>{
    if(m.id===meId)return;
    (m.books||[]).forEach(b=>{
      if(b&&b.end) ev.push({id:'d_'+m.id+'::'+b.id,type:'done',uid:m.id,
                            name:m.name,text:b.title||'',ts:b.lastTs||0});
    });
  });
  // 3) 내가 쓴 글에 다른 사람이 남긴 댓글
  (S.posts||[]).forEach(p=>{
    if(p&&p.id&&p.authorId===meId){
      (p.comments||[]).forEach(c=>{
        if(c&&c.authorId&&c.authorId!==meId){
          const cu=S.members[c.authorId];
          ev.push({id:'c_'+p.id+'::'+c.id,type:'comment',pid:p.id,
                   name:cu?cu.name:'멤버',text:(c.text||'').slice(0,60),ts:c.createdAt||0});
        }
      });
    }
  });
  ev.sort((a,b)=>(b.ts||0)-(a.ts||0)); // 최신순
  return ev.slice(0,50);
}
// 마지막 확인 시각보다 새로운 이벤트 개수 = 안읽음
function unreadCount(){ const t=notifSeenTs(); return notifEvents().filter(e=>(e.ts||0)>t).length; }

function initNotif(){
  // 처음 쓰는 사용자는 "지금 이후"부터 알림을 받도록 기준 시각만 한 번 찍어둔다.
  const m=me();
  if(m && typeof m.notifSeenTs!=='number'){ m.notifSeenTs=Date.now(); save(); }
  const btn=document.getElementById('bellBtn');
  if(btn) btn.onclick=openNotifSheet;
  updateBellBadge();
}

function updateBellBadge(){
  const b=document.getElementById('bellBadge'); if(!b)return;
  const n=unreadCount();
  if(n>0){ b.hidden=false; b.textContent=n>99?'99+':String(n); } else b.hidden=true;
}

// 실시간 갱신 때마다 호출됨: 배지 갱신 + 새 소식이면 토스트(이 기기에서만 한 번)
let _notifTopTs=0;
function scanNotifications(){
  const evs=notifEvents();
  const t=notifSeenTs();
  const top=evs[0];
  // 가장 최근 이벤트가 (안읽음이고) 직전에 알린 것보다 새로우면 토스트
  if(top && (top.ts||0)>t && (top.ts||0)>_notifTopTs){
    _notifTopTs=top.ts||0;
    const msg=top.type==='post'?`${top.name}님이 새 문장을 올렸어요 ✨`
             :top.type==='comment'?`${top.name}님이 내 글에 댓글을 남겼어요 💬`
                               :`${top.name}님이 «${top.text}» 완독했어요 📚`;
    toast(msg);
    try{
      if('Notification'in window&&Notification.permission==='granted'&&document.hidden)
        new Notification('꾸독',{body:msg,icon:ASSETS.logo,tag:'kkudok'});
    }catch(e){}
  }
  updateBellBadge();
}

function openNotifSheet(){
  if('Notification'in window&&Notification.permission==='default'){ try{Notification.requestPermission();}catch(e){} }
  const t=notifSeenTs();
  const evs=notifEvents();
  const rows=evs.length?evs.map(ev=>{
    const uid=ev.uid||'';
    const unread=(ev.ts||0)>t; // 마지막 확인 이후면 안읽음 강조
    const icon=ev.type==='post'?'✨':ev.type==='comment'?'💬':'📚';
    const ttl=ev.type==='post'?'님의 새 문장':ev.type==='comment'?'님이 내 글에 댓글':'님 완독';
    const subDef=ev.type==='done'?'책장에 꽂혔어요':'피드에서 확인해요';
    return `
    <div class="nti ${unread?'unread':''}" data-type="${ev.type}" data-uid="${uid}" data-pid="${ev.pid||''}">
      <div class="ic ${ev.type}">${icon}</div>
      <div class="body">
        <div class="tt"><b>${escT(ev.name)}</b>${ttl}</div>
        <div class="sub">${escT(ev.text)||subDef}</div>
      </div>
      <div class="ago">${timeAgo(ev.ts)}</div>
    </div>`;}).join(''):`<div class="nti-empty">아직 새 소식이 없어요 🔔<br>친구들이 글을 올리거나 완독하면 여기에 떠요</div>`;
  $('#sheet').innerHTML=`<h3>알림</h3>${rows}
    <button class="btn ghost" id="ntClose" style="margin-top:12px">닫기</button>`;
  openOv();
  $('#ntClose').onclick=closeOv;
  $('#sheet').querySelectorAll('.nti').forEach(el=>el.onclick=()=>{
    closeOv();
    if(el.dataset.type==='done'){
      const uid=el.dataset.uid;
      if(uid&&S.members[uid]){S.viewId=uid;go('shelf');return;}
    }
    if(el.dataset.type==='comment'){
      const pid=el.dataset.pid;
      if(pid)feedExpanded.add(pid); // 해당 글 댓글창을 펼친 채로 피드 열기
      go('feed');return;
    }
    go(el.dataset.type==='post'?'feed':'shelf');
  });
  // 알림을 열어 봤으니 "마지막 확인 시각"을 지금으로 저장 → 모든 기기에서 안읽음이 사라짐
  const m=me(); if(m){ m.notifSeenTs=Date.now(); _notifTopTs=m.notifSeenTs; save(); }
  updateBellBadge();
}



/* ---------- boot ---------- */
let _rtUnsub=null;

function subscribeRealtime(){
  if(!window._fb||_rtUnsub)return;
  const {db,roomId}=window._fb;
  const roomRef=db.collection('rooms').doc(roomId);

  // 변경이 와도 전체를 다시 읽지 않고, 바뀐 문서만 S에 반영한 뒤 화면만 갱신.
  // 짧은 시간에 여러 변경이 몰리면 한 번으로 합쳐서 렌더(디바운스).
  let _timer=null;
  const rerender=()=>{
    if($('#ov').classList.contains('on'))return;            // 오버레이 열려 있으면 갱신 보류
    clearTimeout(_timer);
    _timer=setTimeout(()=>{
      // 내 기록이 사라진 경우(내보내짐 등)는 예외적으로 전체 동기화로 처리
      if(!S||!S.meId||!S.members[S.meId]){ syncClub(); return; }
      scanNotifications();
      refreshHeader();
      const r={home:renderHome,checkin:renderCheckin,feed:renderFeed,shelf:renderShelf,club:renderClub,stats:renderStats,dress:renderDress}[tab];
      if(r)r();
    },150);
  };

  // 참가자(멤버): 바뀐 문서만 갱신 (출첵 한 번 = 1 읽기)
  const u1=roomRef.collection('participants').onSnapshot(qs=>{
    if(!S)return;
    qs.docChanges().forEach(ch=>{
      const id=ch.doc.id;
      if(ch.type==='removed'){ delete S.members[id]; if(S.viewId===id)S.viewId=S.meId; return; }
      try{ const mm=ch.doc.data()||{}; if(!mm.id)mm.id=id; if(!mm.char||!CH[mm.char])mm.char=CHKEYS[0]; ensureItems(mm); S.members[mm.id]=mm; }catch(e){}
    });
    rerender();
  }, e=>console.warn('participants snapshot',e));

  // 피드 글: 바뀐 문서만 갱신 (좋아요·댓글 하나 = 1 읽기)
  const u3=roomRef.collection('posts').onSnapshot(qs=>{
    if(!S)return; if(!Array.isArray(S.posts))S.posts=[];
    qs.docChanges().forEach(ch=>{
      const id=ch.doc.id;
      const i=S.posts.findIndex(p=>p&&p.id===id);
      if(ch.type==='removed'){ if(i>=0)S.posts.splice(i,1); return; }
      try{ const p=ch.doc.data()||{}; if(!p.id)p.id=id; if(i>=0)S.posts[i]=p; else S.posts.push(p); }catch(e){}
    });
    rerender();
  }, e=>console.warn('posts snapshot',e));

  // 방 문서(모임장 등): 가벼우니 변경 시 ownerId만 반영
  const u2=roomRef.onSnapshot(snap=>{
    if(!S)return;
    try{ const d=snap.exists?snap.data():null; if(d&&('leader'in d))S.ownerId=d.leader||null; }catch(e){}
    rerender();
  }, e=>console.warn('room snapshot',e));

  _rtUnsub=()=>{u1();u2();u3();};
}

function boot(){
  refreshHeader();renderTabs();go('home');
  subscribeRealtime();
  initNotif();updateBellBadge();
  startPresence();
}
  
function showOnboarding(){
  onbChar=null;
  renderCharpick();checkOnb();
  $('#onb').classList.add('on');
}

/* ---------- auth (Google) ---------- */
window._authUid=null;
function hideSplash(){               // 인증 확인이 끝나면 스플래시를 부드럽게 치움
  const sp=document.getElementById('splash');
  if(!sp) return;
  sp.classList.add('hide');
  setTimeout(()=>{ try{sp.remove();}catch(e){} },300);  // 트랜지션(.25s) 후 DOM에서 제거
}
function showLogin(){
  try{document.getElementById('loginLogo').src=ASSETS.logo;}catch(e){}
  $('#login').classList.add('on');
}
async function startAppForUser(uid){
  window._authUid=uid;
  // 구글 계정(uid)을 회원 식별자로 사용 → 기기 바꿔도 같은 계정이면 동일 회원
  try{localStorage.setItem('kkudok::myid::'+(window._kkRoom||'main'),uid);}catch(e){}

  await loadClub(true);   // 가벼운 부팅: 내 문서만 읽고 나머지는 리스너가 채움
  $('#login').classList.remove('on');

  if(S.meId===uid && S.members[uid]){ boot(); }   // 기존 회원 → 홈
  else { showOnboarding(); }                       // 신규 → 온보딩
}

(function(){
  const hasAuth=!!(window._fb && window.firebase && firebase.auth);
  if(hasAuth){
    // 로그인 화면을 미리 띄우지 않는다. 스플래시가 화면을 덮은 상태로 인증 확인을 기다림.
    const btn=document.getElementById('googleBtn');
    if(btn) btn.onclick=async()=>{
      const note=document.getElementById('loginNote');
      try{
        const p=new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(p);
      }catch(e){
        console.warn('google sign-in',e);
        const code=e&&e.code;
        if(code==='auth/operation-not-allowed'){ if(note)note.innerHTML='⚠️ Firebase 콘솔에서 Google 로그인을 먼저 켜주세요.'; }
        else if(code==='auth/unauthorized-domain'){ if(note)note.innerHTML='⚠️ Firebase 승인된 도메인에 이 주소를 추가해주세요.'; }
        else if(code&&code!=='auth/popup-closed-by-user'&&code!=='auth/cancelled-popup-request'){ if(note)note.innerHTML='로그인에 실패했어요. 잠시 후 다시 시도해주세요.'; }
      }
    };
    firebase.auth().onAuthStateChanged(async user=>{
      if(user){
        // 이미 로그인된(세션 복원) 사용자 → 로그인창 없이 바로 앱으로
        try{ await startAppForUser(user.uid); }
        catch(e){ console.error(e); }
        finally{ hideSplash(); }
      } else {
        // 진짜 로그인이 필요한 경우에만 로그인 화면을 보여줌
        showLogin();
        hideSplash();
      }
    });
  } else {
    // 비-Firebase(아티팩트 미리보기 등): 기존 흐름 유지
    (async function(){
      try{
        await loadClub();
        if(!S.meId||!S.members[S.meId])await migrateLegacy();
        if(!S.meId||!S.members[S.meId]){ showOnboarding();return; }
        boot();
      } finally { hideSplash(); }
    })();
  }
})();
</script>
