<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>꾸독 · 함께 읽는 독서 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBFAF7; --card:#FFFFFF; --ink:#232220; --soft:#9B978F; --line:#EFE9DF;
  --honey:#F2994A; --honey-d:#E07B2C; --honey-s:#FCEBD8;
  --moss:#5FA17E; --moss-s:#E2F0E8;
  --wood:#CFA374; --wood-d:#A87C4F;
  --red:#E24B4A;
  --shadow:0 6px 22px rgba(60,45,30,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#EDE7DC;font-family:'Noto Sans KR',system-ui,sans-serif;color:var(--ink)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;
  display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.06)}
/* header */
.hd{display:flex;align-items:center;gap:10px;padding:14px 18px 10px}
.hd img{width:34px;height:34px;object-fit:contain}
.hd .t{font-weight:900;font-size:20px;letter-spacing:-.5px}
.hd .t small{display:block;font-size:11px;font-weight:500;color:var(--soft);letter-spacing:0}
.hd .me{margin-left:auto;display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
  border-radius:30px;padding:4px 10px 4px 4px;box-shadow:var(--shadow)}
.hd .me .av{width:28px;height:28px;border-radius:50%;background:var(--honey-s);overflow:hidden;display:grid;place-items:center}
.hd .me .av img{width:30px;height:30px;object-fit:contain;margin-top:4px}
.hd .me .av .tinyav{width:30px;height:30px;margin-top:3px}
.hd .me .av .tinyav img{width:100%;height:100%;margin-top:0}
.peer-cal{position:relative}
.peer-del{position:absolute;top:6px;right:6px;width:19px;height:19px;border:none;border-radius:50%;background:#F0EADF;color:var(--soft);font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0;z-index:2}
.peer-del:active{background:#E5DCCB}
.hd .me b{font-size:13px}
/* viewing banner */
.viewbar{display:none;align-items:center;gap:8px;margin:0 14px 6px;padding:9px 12px;border-radius:14px;
  background:var(--moss-s);color:#2f6b4d;font-size:13px;font-weight:600}
.viewbar.on{display:flex}
.viewbar button{margin-left:auto;background:#fff;border:1px solid #cfe5da;border-radius:20px;padding:5px 11px;font-weight:700;color:#2f6b4d}
/* scroll area */
.scroll{flex:1;overflow-y:auto;padding:6px 14px 96px}
.screen{display:none}.screen.on{display:block}
/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.sec-t{font-size:13px;font-weight:700;color:var(--soft);margin:2px 4px 10px;display:flex;align-items:center;gap:6px}
/* avatar */
.avatar{position:relative;width:100%;max-width:230px;margin:0 auto;aspect-ratio:var(--ar,1)}
.avatar .base{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center bottom}
.avatar svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
/* home hero */
.hero{text-align:center;padding-top:22px}
.hero .avatar{max-width:158px;margin-top:2px}
.hero .nm{font-weight:900;font-size:22px;margin-top:6px}
.agebadge{display:inline-flex;align-items:center;gap:6px;background:var(--honey-s);color:var(--honey-d);
  font-weight:800;font-size:13px;padding:5px 12px;border-radius:30px;margin-top:6px}
.gauge{height:9px;background:#F0EADF;border-radius:30px;margin:12px 8px 4px;overflow:hidden}
.gauge i{display:block;height:100%;background:linear-gradient(90deg,var(--honey),#F7B36A);border-radius:30px;transition:width .5s}
.gsub{font-size:12px;color:var(--soft);margin:0 8px}
/* ---- 가로형 프로필 카드 ---- */
.pcard{display:flex;align-items:center;gap:15px;padding:18px 16px}
.pc-av{flex:none;width:112px;height:112px;border-radius:50%;border:1px solid var(--line);overflow:hidden;position:relative}
.pc-av .avatar{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:80px;max-width:none;margin:0}
.pc-body{flex:1;min-width:0}
.pc-name{font-weight:900;font-size:22px;line-height:1.1;margin-bottom:9px}
.pc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.pc-age{font-weight:800;font-size:14.5px;color:var(--ink);display:inline-flex;align-items:center;gap:5px}
.nickbadge{display:inline-flex;align-items:center;background:var(--honey-s);color:var(--honey-d);font-weight:800;font-size:12.5px;padding:5px 12px;border-radius:30px}
.pcard .gauge{margin:0 0 7px}
.pcard .gsub{margin:0}
/* ---- 출첵 탭: 읽고 있는 책 슬라이드 ---- */
.ci-head{display:flex;align-items:baseline;justify-content:space-between;margin:2px 4px 10px}
.ci-head b{font-size:17px;font-weight:900}
.ci-head small{font-size:11.5px;color:var(--soft)}
.rbooks{display:flex;gap:11px;overflow-x:auto;padding:12px 4px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.rbooks::-webkit-scrollbar{display:none}
.rbook{flex:0 0 128px;background:#fff;border:2px solid var(--line);border-radius:18px;padding:10px;cursor:pointer;position:relative;transition:border-color .15s,box-shadow .15s}
.rbook.on{border-color:var(--honey);box-shadow:0 6px 18px rgba(242,153,74,.22)}
.rbook .rc{width:100%;aspect-ratio:3/4.2;border-radius:11px;background:#F0EADF center/cover no-repeat;margin-bottom:8px}
.rbook .rt{font-size:13px;font-weight:800;line-height:1.3;height:34px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.rbook .rp{font-size:12px;font-weight:800;color:var(--honey-d);margin:5px 0 6px}
.rbook .rp .pc{color:var(--soft);font-weight:700;margin-left:3px}
.rg{height:6px;background:#F0EADF;border-radius:30px;overflow:hidden}
.rg i{display:block;height:100%;background:linear-gradient(90deg,var(--honey),#F7B36A);border-radius:30px;transition:width .4s}
.rbook .chk{position:absolute;top:-7px;right:-7px;width:24px;height:24px;border-radius:50%;background:var(--honey);color:#fff;display:none;place-items:center;font-size:13px;box-shadow:0 2px 6px rgba(242,153,74,.45)}
.rbook.on .chk{display:grid}
.rbook.add{display:flex;flex-direction:column;align-items:center;justify-content:center;border-style:dashed;color:var(--soft);background:#FCFAF6;min-height:200px}
.rbook.add .plus{font-size:30px;line-height:1;margin-bottom:6px;color:var(--honey)}
.rbook.add span{font-size:12px;font-weight:700}
.ci-empty{text-align:center;color:var(--soft);font-size:13px;line-height:1.7;padding:30px 16px}
/* ---- 선택 책 + 페이지 입력 ---- */
.ci-sel{display:flex;align-items:center;gap:12px;background:var(--honey-s);border-radius:15px;padding:11px 13px;margin-bottom:16px}
.ci-sel .cv{width:42px;height:56px;border-radius:8px;background:#fff center/cover no-repeat;flex:none;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.ci-sel .meta b{display:block;font-size:14.5px;font-weight:800;margin-bottom:3px}
.ci-sel .meta small{font-size:12.5px;color:var(--honey-d);font-weight:700}
.ci-lbl{font-size:14px;font-weight:800;margin:4px 2px 12px}
.pstep{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px}
.pstep button{width:54px;height:54px;border-radius:50%;border:none;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.08);font-size:24px;color:var(--honey-d);cursor:pointer;flex:none;display:grid;place-items:center;user-select:none}
.pstep button:active{background:#F7F1E8}
.pstep .pin{display:flex;align-items:baseline;gap:2px;min-width:96px;justify-content:center}
.pstep .pin input{width:82px;border:none;background:transparent;text-align:right;font-size:26px;font-weight:900;color:var(--ink);outline:none;font-family:inherit}
.pstep .pin span{font-size:17px;font-weight:800;color:var(--soft)}
.cibtn{width:100%;border:none;border-radius:16px;background:linear-gradient(90deg,var(--honey),var(--honey-d));color:#fff;font-size:16px;font-weight:800;padding:16px;cursor:pointer;box-shadow:0 6px 18px rgba(242,153,74,.32)}
.cibtn:active{filter:brightness(.96)}
.cibtn.done{background:var(--moss);box-shadow:0 6px 18px rgba(95,161,126,.32)}
.cistat{text-align:center;font-size:13px;font-weight:700;color:var(--soft);margin-top:12px}
.cistat.ok{color:var(--moss)}
/* streak */
.streak{display:flex;align-items:center;gap:14px}
.streak .fire{width:64px;height:64px;border-radius:18px;background:linear-gradient(160deg,#FFE6CB,#FBD2A6);
  display:grid;place-items:center;font-size:34px;flex:none}
.streak .big{font-size:34px;font-weight:900;line-height:1}
.streak .lb{font-size:12.5px;color:var(--soft);margin-top:3px}
.readbtn{margin-left:auto;background:var(--honey);color:#fff;font-weight:800;font-size:14px;
  padding:12px 16px;border-radius:16px;box-shadow:0 4px 14px rgba(242,153,74,.4)}
.readbtn.done{background:var(--moss);box-shadow:0 4px 14px rgba(95,161,126,.35)}
.readbtn:disabled{opacity:.5;box-shadow:none}
/* calendar */
.cal-h{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;font-weight:800}
.cal-h button{width:30px;height:30px;border-radius:50%;background:#F4EFE6;font-size:16px;color:var(--soft)}
.dow,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dow span{text-align:center;font-size:11px;color:var(--soft);font-weight:700;padding-bottom:2px}
.cell{aspect-ratio:1;border-radius:12px;display:grid;place-items:center;position:relative;font-size:12px;color:var(--soft)}
.cell.pad{visibility:hidden}
.cell.read{background:#FFF6EC;color:var(--honey-d);font-weight:800;box-shadow:0 2px 7px rgba(242,153,74,.2)}
.cell.read::after{content:"🍎";position:absolute;font-size:15px;transform:rotate(-14deg) translateY(-1px);filter:drop-shadow(0 1px 1px rgba(120,70,20,.25))}
.cell.read span{display:none}
.cell.today{outline:2px solid var(--honey-d);outline-offset:1px}
.cell.tap{cursor:pointer}
/* leaderboard */
.lead{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:linear-gradient(120deg,#FFF6EC,#FDEFE0);border:1px solid #F4E3CE;margin-bottom:10px}
.lead .rk{font-size:26px}
.lead .av{width:46px;height:46px;border-radius:50%;background:#fff;overflow:hidden;display:grid;place-items:center;flex:none;border:2px solid #F2D9B6}
.lead .av img{width:48px;margin-top:7px}
.lead .nm{font-weight:900;font-size:16px}
.lead .ds{font-size:12px;color:var(--honey-d);font-weight:700}
.row-m{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:14px;cursor:pointer}
.row-m:active{background:#F6F1E8}
.row-m .rk{width:22px;text-align:center;font-weight:800;color:var(--soft)}
.row-m .av{width:38px;height:38px;border-radius:50%;background:var(--honey-s);overflow:hidden;display:grid;place-items:center;flex:none}
.row-m .av img{width:40px;margin-top:5px}
.row-m .nm{font-weight:700}
.row-m .sub{font-size:11.5px;color:var(--soft)}
.row-m .cnt{margin-left:auto;text-align:right}
.row-m .cnt b{font-size:16px;color:var(--honey-d)}
.row-m .cnt small{display:block;font-size:11px;color:var(--soft)}
.row-m.meRow{background:#FFF8F0}
/* shelf */
.shelfwrap{padding:4px 2px}
.shelf-row{position:relative;margin-bottom:18px}
.books{display:flex;align-items:flex-end;gap:4px;min-height:96px;padding:0 6px}
.book{width:34px;flex:none;border-radius:3px 3px 1px 1px;overflow:hidden;position:relative;
  box-shadow:1px 0 0 rgba(0,0,0,.08);animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
.book img{width:100%;height:100%;object-fit:cover;display:block}
.book .spine{height:100%;display:flex;align-items:center;justify-content:center;padding:6px 2px;
  writing-mode:vertical-rl;text-orientation:mixed;font-size:9px;font-weight:700;color:#fff;
  text-align:center;line-height:1.1;overflow:hidden}
.book .num{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:8px;color:rgba(255,255,255,.85);font-weight:800}
@keyframes pop{0%{transform:translateY(14px) scale(.7);opacity:0}60%{transform:translateY(-3px) scale(1.04)}100%{transform:none;opacity:1}}
.board{height:14px;background:linear-gradient(var(--wood),var(--wood-d));border-radius:3px;
  box-shadow:0 6px 10px rgba(120,85,45,.18),inset 0 2px 0 rgba(255,255,255,.18)}
.shelf-empty{text-align:center;color:var(--soft);font-size:13px;padding:22px 0}
/* filters */
.filters{display:flex;gap:8px;margin-bottom:12px}
.yearflt{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;-ms-overflow-style:none}
.yearflt::-webkit-scrollbar{display:none}
.yearflt .chip{white-space:nowrap;flex:none}
.chip{padding:8px 14px;border-radius:30px;background:#F4EFE6;font-size:13px;font-weight:700;color:var(--soft)}
.chip.on{background:var(--ink);color:#fff}
/* book list */
.bl{display:flex;gap:12px;padding:11px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:10px}
.bl .cv{width:46px;height:64px;border-radius:6px;background:#EDE6DA;overflow:hidden;flex:none;display:grid;place-items:center;color:var(--soft);font-size:10px}
.bl .cv img{width:100%;height:100%;object-fit:cover}
.bl .info{flex:1;min-width:0}
.bl .info b{display:block;font-size:14.5px;line-height:1.3}
.bl .info .au{font-size:12px;color:var(--soft);margin:2px 0 6px}
.tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px}
.tag.read{background:var(--honey-s);color:var(--honey-d)}
.tag.done{background:var(--moss-s);color:#3a7a59}
.bl .dt{font-size:11px;color:var(--soft);margin-top:5px}
.bl .acts{margin-left:auto;align-self:flex-start;display:flex;gap:4px}
.bl .edit,.bl .del{color:#cabfae;font-size:17px;padding:2px 4px;line-height:1}
.bl .edit:active,.bl .del:active{color:var(--honey-d)}
/* stats */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat b{display:block;font-size:30px;font-weight:900;color:var(--honey-d)}
.stat span{font-size:12px;color:var(--soft)}
.bars{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:6px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bars .b i{width:100%;max-width:18px;background:linear-gradient(var(--honey),#F8C08A);border-radius:5px 5px 0 0;min-height:3px;transition:height .5s}
.bars .b.cur i{background:linear-gradient(var(--moss),#88c4a4)}
.bars .b em{font-size:9px;color:var(--soft);font-style:normal}
.bars .b u{font-size:9px;color:var(--ink);font-weight:800;text-decoration:none}
/* stats: period switch + member horizontal bars */
.pswitch{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pseg{display:flex;background:#F4EFE6;border-radius:30px;padding:3px;flex:none}
.pseg button{padding:7px 14px;border-radius:30px;font-size:12.5px;font-weight:700;color:var(--soft)}
.pseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(60,45,30,.12)}
.pnav{margin-left:auto;display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
.pnav button{width:30px;height:30px;border-radius:50%;background:#F4EFE6;font-size:16px;color:var(--soft)}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.hbar .av{width:34px;height:34px;border-radius:50%;background:var(--honey-s);overflow:hidden;display:grid;place-items:center;flex:none}
.hbar .av .tinyav img{width:100%;margin-top:0}
.hbar .nm{font-size:12.5px;font-weight:700;width:48px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar .track{flex:1;height:18px;background:#F2EDE4;border-radius:30px;overflow:hidden}
.hbar .track i{display:block;height:100%;background:linear-gradient(90deg,var(--honey),#F7B36A);border-radius:30px;min-width:3px;transition:width .5s}
.hbar.meBar .track i{background:linear-gradient(90deg,var(--moss),#88c4a4)}
.hbar .val{width:62px;flex:none;text-align:right;font-size:11.5px;color:var(--soft);font-weight:700}
.hbar .val b{color:var(--honey-d);font-size:13px}
/* dress */
.dcat{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.dcat::-webkit-scrollbar{display:none}
.dcat .c{padding:8px 13px;border-radius:30px;background:#F4EFE6;font-size:13px;font-weight:700;color:var(--soft);white-space:nowrap}
.dcat .c.on{background:var(--honey);color:#fff}
.items{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item{position:relative;border:2px solid var(--line);border-radius:16px;background:#fff;padding:6px;cursor:pointer;aspect-ratio:1;overflow:hidden}
.item.on{border-color:var(--honey);background:#FFF8F0}
.item .mini{width:100%;height:100%;position:relative}
.item .mini .b{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center}
.item .mini svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.item .nm{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:var(--soft)}
.item .bgswatch{width:100%;height:100%;border-radius:13px}
.item.bgtile{background:#fff}
.item .lock{position:absolute;inset:0;background:rgba(251,250,247,.78);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--soft);text-align:center;line-height:1.4}
.item.eq{border-color:var(--moss)}
.item .chk{position:absolute;top:4px;right:5px;width:18px;height:18px;border-radius:50%;background:var(--moss);color:#fff;font-size:11px;display:grid;place-items:center}
/* bottom tabs */
.tabs{position:sticky;bottom:0;display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--soft);font-size:10.5px;font-weight:700}
.tab svg{width:23px;height:23px}
.tab.on{color:var(--honey-d)}
/* sheet */
.ov{position:fixed;inset:0;background:rgba(35,30,25,.42);display:none;align-items:flex-end;justify-content:center;z-index:40}
.ov.on{display:flex}
.sheet{background:#fff;width:100%;max-width:460px;border-radius:24px 24px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  max-height:90vh;overflow-y:auto;animation:up .3s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin:2px 0 14px;font-size:18px;font-weight:900;text-align:center}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:700;color:var(--soft);display:block;margin-bottom:5px}
.field input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;font-size:15px;background:#FCFBF8}
.field input:focus{outline:none;border-color:var(--honey)}
.field .hint{font-size:11px;color:var(--soft);margin-top:4px}
.dates{display:flex;gap:10px}.dates .field{flex:1}
.searchres{border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-top:-4px;margin-bottom:13px;max-height:240px;overflow-y:auto}
.sr{display:flex;gap:10px;padding:9px 11px;cursor:pointer;border-bottom:1px solid #F4EFE6;align-items:center}
.sr:last-child{border-bottom:none}
.sr:active{background:#FBF6EE}
.sr img{width:34px;height:48px;object-fit:cover;border-radius:4px;background:#EDE6DA;flex:none}
.sr .ph{width:34px;height:48px;border-radius:4px;background:#EDE6DA;flex:none}
.sr b{font-size:13.5px;line-height:1.3;display:block}
.sr small{font-size:11px;color:var(--soft)}
.sr-state{padding:11px;font-size:12.5px;color:var(--soft);text-align:center}

<script>
const CH = ASSETS.chars, CHKEYS = Object.keys(CH);
document.getElementById('logo').src = ASSETS.logo;
document.getElementById('onbLogo').src = ASSETS.logo;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const todayISO = () => new Date().toISOString().slice(0,10);
const D = iso => { const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); };
const fmt = iso => iso ? iso.slice(5).replace('-','.') : '';
const daysBetween = (a,b)=>Math.round((D(b)-D(a))/86400000);
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('on'),1700);}


/* ---------- storage layer (Firestore 공용 DB) ----------
   member:<id> (shared) -> rooms/{roomId}/participants/<id>
   owner       (shared) -> rooms/{roomId} 문서의 leader 필드
   myid        (personal) -> 이 기기/브라우저의 localStorage */
(function(){
  const params=new URLSearchParams(location.search);
  const roomId=(params.get('room')||'main').trim()||'main';
  window._kkRoom=roomId;

  // claude.ai 아티팩트 미리보기처럼 네이티브 storage가 있으면 그대로 사용
  const native=(typeof window!=='undefined') && window.storage
    && typeof window.storage.get==='function'
    && typeof window.storage.set==='function';
  if(native){ window._fb=null; return; }

  if(typeof firebase==='undefined' || !firebase.firestore){
    console.error('Firebase가 로드되지 않았습니다. <head>의 설정을 확인하세요.');
    return;
  }
  const db=firebase.firestore();
  window._fb={db,roomId};
  const roomRef=()=>db.collection('rooms').doc(roomId);
  const partCol=()=>roomRef().collection('participants');
  const partRef=id=>partCol().doc(id);
  const myidKey='kkudok::myid::'+roomId;

  window.storage={
    async get(key){
      if(key.indexOf('member:')===0){
        const snap=await partRef(key.slice(7)).get();
        return snap.exists?{key,value:JSON.stringify(snap.data())}:null;
      }
      if(key==='owner'){
        const snap=await roomRef().get();
        const leader=snap.exists?(snap.data().leader||null):null;
        return leader?{key,value:leader}:null;
      }
      if(key==='myid'){
        const v=localStorage.getItem(myidKey);
        return v?{key,value:v}:null;
      }
      return null;
    },

    async set(key,value){
      if(key.indexOf('member:')===0){
        await partRef(key.slice(7)).set(JSON.parse(value));
        return {key,value};
      }

      if(key==='owner'){
        await roomRef().set({leader:value},{merge:true});
        return {key,value};
      }

      if(key==='myid'){
        localStorage.setItem(myidKey,value);
        return {key,value};
      }

      return {key,value};
    },

    async delete(key){
      if(key.indexOf('member:')===0){
        await partRef(key.slice(7)).delete();
      }else if(key==='myid'){
        localStorage.removeItem(myidKey);
      }
      return {key,deleted:true};
    },

    async list(prefix){
      if(prefix==='member:'){
        const qs=await partCol().get();
        return {
          keys:qs.docs.map(d=>'member:'+d.id)
        };
      }
      return {keys:[]};
    }
  };
})();

/* head/body anchors are fractions of width(x) & height(y). avatar svg viewBox = 100 x VH */
function vh(ck){return 100*CH[ck].h/CH[ck].w;}
function boxes(ck){
  const H=CH[ck].head,B=CH[ck].body,V=vh(ck);
  return {
    H:{x:H[0]*100,y:H[1]*V,w:H[2]*100,h:H[3]*V},
    B:{x:B[0]*100,y:B[1]*V,w:B[2]*100,h:B[3]*V},
    V
  };
}

  <rect x="${cx-w/2}" y="${H.y+H.h*0.10}" width="${w}" height="${H.h*0.13}" rx="3" fill="${fold||c}" stroke="${STK}" stroke-width="${SW}"/>
  <circle cx="${cx}" cy="${top}" r="${H.w*0.07}" fill="${fold||'#fff'}" stroke="${STK}" stroke-width="${SW}"/>`;};}
function hat_cap(c){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,w=H.w*0.96;
  return `<path d="M${cx-w/2},${H.y+H.h*0.14} a${w/2},${H.h*0.42} 0 0 1 ${w},0 z" fill="${c}" stroke="${STK}" stroke-width="${SW}"/>
  <path d="M${cx+w*0.12},${H.y+H.h*0.13} q${w*0.55},${-2} ${w*0.6},${H.h*0.06} q${-w*0.2},${H.h*0.05} ${-w*0.55},0 z" fill="${c}" stroke="${STK}" stroke-width="${SW}"/>
  <circle cx="${cx}" cy="${H.y-H.h*0.06}" r="2.4" fill="#fff" stroke="${STK}" stroke-width="${SW}"/>`;};}
function hat_crown(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,w=H.w*0.7,b=H.y+H.h*0.02,t=H.y-H.h*0.22;
  return `<path d="M${cx-w/2},${b} L${cx-w/2},${t} L${cx-w*0.25},${b-H.h*0.12} L${cx},${t} L${cx+w*0.25},${b-H.h*0.12} L${cx+w/2},${t} L${cx+w/2},${b} z"
   fill="#F6C544" stroke="${STK}" stroke-width="${SW}" stroke-linejoin="round"/>
  <circle cx="${cx}" cy="${t+1.5}" r="1.8" fill="#E24B4A"/><circle cx="${cx-w/2}" cy="${t}" r="1.6" fill="#E24B4A"/><circle cx="${cx+w/2}" cy="${t}" r="1.6" fill="#E24B4A"/>`;};}
function hat_party(c){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,w=H.w*0.46,b=H.y+H.h*0.04,t=H.y-H.h*0.4;
  return `<path d="M${cx-w/2},${b} L${cx+w/2},${b} L${cx},${t} z" fill="${c}" stroke="${STK}" stroke-width="${SW}" stroke-linejoin="round"/>
  <circle cx="${cx-w*0.18}" cy="${b-H.h*0.04}" r="1.5" fill="#fff"/><circle cx="${cx+w*0.12}" cy="${(b+t)/2}" r="1.5" fill="#fff"/>
  <circle cx="${cx}" cy="${t}" r="2.6" fill="#fff" stroke="${STK}" stroke-width="${SW}"/>`;};}
function hat_wizard(c){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,w=H.w*0.62,b=H.y+H.h*0.02,t=H.y-H.h*0.62;
  return `<ellipse cx="${cx}" cy="${b}" rx="${w*0.74}" ry="${H.h*0.07}" fill="${c}" stroke="${STK}" stroke-width="${SW}"/>
  <path d="M${cx-w/2},${b} Q${cx-w*0.1},${(b+t)/2} ${cx},${t} Q${cx+w*0.2},${(b+t)/2} ${cx+w/2},${b} z" fill="${c}" stroke="${STK}" stroke-width="${SW}" stroke-linejoin="round"/>
  <path d="M${cx-1},${b-H.h*0.18} l1.4,3 3,.3 -2.2,2.2 .7,3.1 -2.9,-1.6 -2.9,1.6 .7,-3.1 -2.2,-2.2 3,-.3 z" fill="#F6C544"/>`;};}
function hat_santa(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,w=H.w*0.9;
  return `<path d="M${cx-w/2},${H.y+H.h*0.14} q${w*0.1},${-H.h*0.5} ${w*0.7},${-H.h*0.32} q${w*0.2},${0.04} ${w*0.05},${H.h*0.1} z" fill="#E24B4A" stroke="${STK}" stroke-width="${SW}" stroke-linejoin="round"/>
  <rect x="${cx-w/2}" y="${H.y+H.h*0.08}" width="${w}" height="${H.h*0.12}" rx="3" fill="#fff" stroke="${STK}" stroke-width="${SW}"/>
  <circle cx="${cx+w*0.42}" cy="${H.y-H.h*0.2}" r="3" fill="#fff" stroke="${STK}" stroke-width="${SW}"/>`;};}
function hat_headphones(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2;
  return `<path d="M${H.x+H.w*0.04},${H.y+H.h*0.5} A${H.w*0.46},${H.h*0.55} 0 0 1 ${H.x+H.w*0.96},${H.y+H.h*0.5}" fill="none" stroke="${STK}" stroke-width="3.2"/>
  <rect x="${H.x-H.w*0.02}" y="${H.y+H.h*0.4}" width="${H.w*0.12}" height="${H.h*0.34}" rx="3" fill="#5B6B7A" stroke="${STK}" stroke-width="${SW}"/>
  <rect x="${H.x+H.w*0.9}" y="${H.y+H.h*0.4}" width="${H.w*0.12}" height="${H.h*0.34}" rx="3" fill="#5B6B7A" stroke="${STK}" stroke-width="${SW}"/>`;};}
function hat_flower(){return ctx=>{const H=ctx.H,y=H.y+H.h*0.06,cs=['#F2994A','#E24B4A','#F6C544','#E98FB0','#7FB98B'];let s='';
  for(let i=0;i<5;i++){const x=H.x+H.w*(0.14+i*0.18);s+=`<circle cx="${x}" cy="${y}" r="${H.w*0.07}" fill="${cs[i]}" stroke="${STK}" stroke-width="1.3"/><circle cx="${x}" cy="${y}" r="1.4" fill="#fff8e8"/>`;}
  return s;};}
function hat_leaf(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,y=H.y+H.h*0.02;
  return `<path d="M${cx},${y} q-6,-7 -10,-3 q-1,7 8,6 z" fill="#7FB98B" stroke="${STK}" stroke-width="1.4"/>
  <path d="M${cx},${y} q6,-7 10,-3 q1,7 -8,6 z" fill="#9BCB99" stroke="${STK}" stroke-width="1.4"/>

function hat_halo(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,y=H.y-H.h*0.12;
  return `<ellipse cx="${cx}" cy="${y}" rx="${H.w*0.32}" ry="${H.h*0.08}" fill="none" stroke="#F6C544" stroke-width="3"/>`;};}
function hat_horns(){return ctx=>{const H=ctx.H,cx=H.x+H.w/2;
  return `<path d="M${cx-H.w*0.28},${H.y+H.h*0.1} q-2,-7 2,-9 q3,4 1,9 z" fill="#E24B4A" stroke="${STK}" stroke-width="1.4"/>
  <path d="M${cx+H.w*0.28},${H.y+H.h*0.1} q2,-7 -2,-9 q-3,4 -1,9 z" fill="#E24B4A" stroke="${STK}" stroke-width="1.4"/>`;};}
function hat_band(star){return ctx=>{const H=ctx.H,cx=H.x+H.w/2,y=H.y+H.h*0.1;

/* ---------- state ----------
   member:<id>  (shared)   - each member's own reading record
   owner        (shared)   - id of the club owner (모임장)
   myid         (personal) - this device/account's own member id (= "로그인 정보")
*/
let S=null;
function me(){return S.members[S.meId];}
function view(){return S.members[S.viewId]||me();}
const isMe=()=>S.viewId===S.meId;
const isOwner=()=>!!(S.ownerId&&S.meId&&S.ownerId===S.meId);

async function saveMyId(){
  try{await window.storage.set('myid',S.meId,false);}catch(e){}
}
async function save(){ // persists only the current user's own record
  try{if(S&&S.meId&&S.members[S.meId])await window.storage.set('member:'+S.meId,JSON.stringify(S.members[S.meId]),true);}catch(e){}
}
async function claimOwnerIfEmpty(id){
if(window._fb){
  // Firestore 트랜잭션: leader가 없을 때만 설정 → 방을 처음 만든 사람만 모임장
  try{
    const ref=window._fb.db.collection('rooms').doc(window._fb.roomId);
    const leader=await window._fb.db.runTransaction(async tx=>{
      const snap=await tx.get(ref);
      const cur=snap.exists?(snap.data().leader||null):null;
      if(cur)return cur;                    // 이미 모임장 있음 → member로 합류
      tx.set(ref,{leader:id},{merge:true}); // 최초 1인 = leader
      return id;
    });
    S.ownerId=leader;
  }catch(e){
    try{const r=await window.storage.get('owner',true);S.ownerId=(r&&r.value)||id;}catch(_){}
  }
  return;
}
// (비-Firestore 환경 폴백)
try{
  let cur=null;
  try{const r=await window.storage.get('owner',true);if(r&&r.value)cur=r.value;}catch(e){}
  if(!cur){S.ownerId=id;try{await window.storage.set('owner',id,true);}catch(e){}}
  else S.ownerId=cur;
}catch(e){}
}
async function loadClub(){
  let myId=null;
  try{const r=await window.storage.get('myid');if(r&&r.value)myId=r.value;}catch(e){}
  let ownerId=null;
  try{const r=await window.storage.get('owner',true);if(r&&r.value)ownerId=r.value;}catch(e){}
  const members={};
  try{
    const idx=await window.storage.list('member:',true);
    const keys=(idx&&idx.keys)||[];
    const results=await Promise.all(keys.map(k=>window.storage.get(k,true).catch(()=>null)));
    results.forEach(r=>{if(r&&r.value){try{const mm=JSON.parse(r.value);if(!mm.char||!CH[mm.char])mm.char=CHKEYS[0];members[mm.id]=mm;}catch(e){}}});
  }catch(e){}
  S={members,meId:myId,viewId:myId,ownerId};
}
async function migrateLegacy(){ // brings forward data saved by the old single-user (non-shared) version
  try{
    const old=await window.storage.get('kudok');
    if(old&&old.value){
      const legacy=JSON.parse(old.value);
      if(legacy&&legacy.meId&&legacy.members&&legacy.members[legacy.meId]){
        const my=legacy.members[legacy.meId];
        const id=my.id||legacy.meId;
        S.members[id]=my;S.meId=id;S.viewId=id;
        await saveMyId();await save();
        if(!S.ownerId)await claimOwnerIfEmpty(id);
      }
      try{await window.storage.delete('kudok');}catch(e){}
    }
  }catch(e){}
}
async function syncClub(){ // re-fetch club data from shared storage (other members' updates)
  const wasTab=tab;
  await loadClub();
  if(!S.meId||!S.members[S.meId]){showOnboarding();return;}
  refreshHeader();renderTabs();
  tab=wasTab;document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $('#s-'+tab).classList.add('on');renderTabs();
  ({home:renderHome,checkin:renderCheckin,feed:renderFeed,shelf:renderShelf,club:renderClub,stats:renderStats,dress:renderDress}[tab])();
}
async function removeMember(id){
  if(id===S.ownerId){toast('모임장은 내보낼 수 없어요');return;}
  const target=S.members[id];if(!target)return;
  if(!confirm(target.name+'님을 모임에서 내보낼까요? 기록이 모두 사라져요.'))return;
  delete S.members[id];
  try{await window.storage.delete('member:'+id,true);}catch(e){}
  if(S.viewId===id)S.viewId=S.meId;
  toast('내보냈어요');
}

/* derived */
function readDays(m){const t=todayISO();return new Set(m.reads.filter(x=>x<=t)).size;}
function age(m){return Math.floor(readDays(m)/30);}
function ageProg(m){return readDays(m)%30;}
function nickname(age){
  // TODO: 나이별 별명 추후 확정. 지금은 placeholder 한 개.
  return '응애독서가';
}
function streak(m){const set=new Set(m.reads);let n=0,d=new Date();
  // allow streak to count if read today or yesterday
  if(!set.has(todayISO())){d.setDate(d.getDate()-1);if(!set.has(d.toISOString().slice(0,10)))return 0;}
  for(;;){const iso=d.toISOString().slice(0,10);if(set.has(iso)){n++;d.setDate(d.getDate()-1);}else break;}
  return n;}
function doneBooks(m){return m.books.filter(b=>b.end);}
function inMonth(iso,y,mo){if(!iso)return false;const d=D(iso);return d.getFullYear()===y&&d.getMonth()===mo;}
function monthDone(m,y,mo){return m.books.filter(b=>b.end&&inMonth(b.end,y,mo)).length;}
function monthReadDays(m,y,mo){return m.reads.filter(r=>{const d=D(r);return d.getFullYear()===y&&d.getMonth()===mo;}).length;}

  ['checkin','출첵','M9 11l3 3 8-8M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'],
  ['feed','피드','M4 6h16M4 12h16M4 18h10'],
  ['shelf','책장','M4 5h4v14H4zM10 5h4v14h-4zM16 6l3.5 1-3 13L16 6'],
  ['dress','꾸미기','M12 3l3 3 4-1 1 4-3 3 3 3-1 4-4-1-3 3-3-3-4 1-1-4 3-3-3-3 1-4 4 1z']
];
function _ph(emo,t,desc){return `<div style="text-align:center;padding:78px 24px;color:var(--soft)"><div style="font-size:52px;margin-bottom:14px">${emo}</div><div style="font-size:18px;font-weight:800;color:var(--ink);margin-bottom:8px">${t}</div><div style="font-size:13.5px;line-height:1.65">${desc}<br>곧 만나요!</div></div>`;}
function renderFeed(){$('#s-feed').innerHTML=_ph('📰','피드','모임 친구들의 소식 피드를 준비하고 있어요.');}
function renderTabs(){
  $('#tabs').innerHTML=TABMETA.map(([k,l,d])=>
    `<button class="tab ${k===tab?'on':''}" data-tab="${k}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>${l}</button>`).join('');
  $('#tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>go(b.dataset.tab));
}
function go(t){
  if(t==='dress'&&!isMe()){toast('내 캐릭터만 꾸밀 수 있어요');return;}
  tab=t;document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $('#s-'+t).classList.add('on');renderTabs();
  ({home:renderHome,checkin:renderCheckin,feed:renderFeed,shelf:renderShelf,club:renderClub,stats:renderStats,dress:renderDress}[t])();
  $('.scroll').scrollTop=0;
}
function refreshHeader(){
  const m=me();$('#meNm').textContent=m.name;
  $('#meAv').innerHTML=avatarTiny(m);
  $('#meAv').style.background=m.bg||'var(--card)';
  const vb=$('#viewbar');
  if(!isMe()){vb.classList.add('on');$('#viewtxt').textContent=view().name+'님의 기록을 보는 중';}
  else vb.classList.remove('on');
}

/* ---------- HOME ---------- */
let calY,calM;
let checkinBookId=null;
function renderCheckin(){
  refreshHeader();
  S.viewId=S.meId; // 출첵은 항상 내 기록
  const m=me(),a=age(m),prog=ageProg(m),st=streak(m);
  const today=todayISO(),readToday=new Set(m.reads).has(today);
  if(calY==null){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}
  const others=Object.values(S.members).filter(x=>x.id!==S.meId);
  const reading=m.books.filter(b=>!b.end);
  if(!reading.find(b=>b.id===checkinBookId))checkinBookId=reading.length?reading[0].id:null;
  const sel=reading.find(b=>b.id===checkinBookId)||null;
  const pages=sel?(sel.pages||0):0;

  const slider=reading.map(b=>{
    const pg=b.pages||0,cur=b.cur||0,pct=pg?Math.min(100,Math.round(cur/pg*100)):0;
    return `<div class="rbook ${b.id===checkinBookId?'on':''}" data-id="${b.id}">
      <div class="chk">✓</div>
      <div class="rc" style="${b.cover?`background-image:url(${b.cover})`:''}"></div>
      <div class="rt">${esc(b.title)}</div>
      <div class="rp">${cur} / ${pg||'–'}p <span class="pc">${pg?pct+'%':''}</span></div>
      <div class="rg"><i style="width:${pct}%"></i></div>
    </div>`;
  }).join('')+`<div class="rbook add" id="ciAdd"><div class="plus">+</div><span>책장에서<br>등록</span></div>`;

  $('#s-checkin').innerHTML=`
  <div class="ci-head"><b>읽고 있는 책</b><small>탭해서 골라요 · 책 등록은 책장에서</small></div>
  ${reading.length
    ?`<div class="rbooks" id="rbooks">${slider}</div>`
    :`<div class="ci-empty">아직 읽고 있는 책이 없어요 📖<br>아래 버튼으로 책을 등록해보세요<br><br><button class="btn" id="ciAdd2" style="max-width:220px;margin:0 auto">책 등록하러 가기</button></div>`}
  ${sel?`
  <div class="card" style="margin-top:14px">
    <div class="ci-sel">
      <div class="cv" style="${sel.cover?`background-image:url(${sel.cover})`:''}"></div>
      <div class="meta"><b>${esc(sel.title)}</b><small>${sel.cur||0} / ${sel.pages||'–'}p 까지 읽음</small></div>
    </div>
    <div class="ci-lbl">오늘 읽어서 도달한 페이지</div>
    <div class="pstep">
      <button id="pMinus">−</button>
      <div class="pin"><input id="pInput" type="number" inputmode="numeric" value="${sel.cur||0}"><span>p</span></div>
      <button id="pPlus">+</button>
    </div>
    <button class="cibtn ${readToday?'done':''}" id="ciSave">${readToday?'🍎 오늘 출석 완료':'🍎 저장하고 출석체크'}</button>
    <div class="cistat ${readToday?'ok':''}">${readToday?'오늘 출석했어요 · 페이지를 갱신할 수 있어요':'📌 오늘 아직 출석 전이에요'}</div>
  </div>`:''}
  <div class="card pcard" style="margin-top:14px">
    <div class="pc-av" style="background:${m.bg||'var(--card)'}">${avatarHTML(m)}</div>
    <div class="pc-body">
      <div class="pc-name">${m.name}</div>
      <div class="pc-meta">
        <span class="pc-age">🎂 ${a}살 · 독서 ${readDays(m)}일</span>
        <span class="nickbadge">${nickname(a)}</span>
      </div>
      <div class="gauge"><i style="width:${(prog/30*100).toFixed(0)}%"></i></div>
      <div class="gsub">다음 생일까지 ${30-prog}일 더 읽으면 돼요</div>
    </div>
  </div>
  <div class="card">
    <div class="streak">
      <div class="fire">🔥</div>
      <div><div class="big">${st}<span style="font-size:15px;font-weight:700"> 일</span></div><div class="lb">연속 독서 기록</div></div>
    </div>
  </div>
  <div class="card">
    <div class="cal-h"><button id="pm">‹</button><span>${calY}년 ${calM+1}월</span><button id="nm">›</button></div>
    <div class="dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="grid" id="grid"></div>
    <div class="gsub" style="text-align:center;margin-top:10px">읽은 날에 사과 도장이 콕 찍혀요 · 날짜를 눌러 기록을 바꿀 수 있어요</div>
  </div>
  ${others.length?`
  <div class="sec-t" style="margin-top:2px">🍎 모임 친구들 사과 출첵</div>
  <div class="peer-cals" id="peerCals">${others.map(miniCalHTML).join('')}</div>`:''}`;

  $('#rbooks')&&$('#rbooks').querySelectorAll('.rbook[data-id]').forEach(el=>el.onclick=()=>{checkinBookId=el.dataset.id;renderCheckin();});
  $('#ciAdd')&&($('#ciAdd').onclick=()=>openBookSheet(null));
  $('#ciAdd2')&&($('#ciAdd2').onclick=()=>openBookSheet(null));
  const pin=$('#pInput');
  const clamp=v=>{v=parseInt(v,10);if(isNaN(v))v=0;if(v<0)v=0;if(pages&&v>pages)v=pages;return v;};
  if(pin){
    $('#pMinus').onclick=()=>{pin.value=clamp((+pin.value||0)-1);};
    $('#pPlus').onclick=()=>{pin.value=clamp((+pin.value||0)+1);};
    pin.onblur=()=>{pin.value=clamp(pin.value);};
  }
  $('#ciSave')&&($('#ciSave').onclick=async()=>{
    const b=me().books.find(x=>x.id===checkinBookId);
    if(b&&pin)b.cur=clamp(pin.value);
    const t=todayISO();if(!me().reads.includes(t))me().reads.push(t);
    await save();renderCheckin();toast('출석 완료! 🍎');
  });
  $('#pm').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}drawCal();};
  $('#nm').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}drawCal();};
  drawCal();
}
function renderHome(){ $('#s-home').innerHTML=_ph('🏠','홈','홈 화면을 새로 준비하고 있어요.'); }
function miniCalHTML(m){
  const set=new Set(m.reads),today=todayISO(),first=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  let dots='',cnt=0;
  for(let i=0;i<first;i++)dots+='<i class="pad"></i>';
  for(let d=1;d<=dim;d++){
    const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,r=set.has(iso)&&iso<=today;
    if(r)cnt++;dots+=`<i class="${r?'on':''}"></i>`;
  }
  return `<div class="peer-cal" data-id="${m.id}">
    ${(S.meId===S.ownerId&&m.id!==S.ownerId)?`<button class="peer-del" data-del="${m.id}" title="멤버 삭제">×</button>`:''}
    <div class="ph"><div class="av">${avatarTiny(m)}</div><b>${m.name}</b><span class="cnt">${cnt}일</span></div>
    <div class="peer-mini-grid">${dots}</div>
  </div>`;
}
async function removePeer(id){
  const mm=S.members[id];
  if(!confirm((mm?mm.name+'님을':'이 멤버를')+' 모임에서 삭제할까요?\n(그 멤버의 기록도 함께 사라져요)'))return;
  try{await window.storage.delete('member:'+id,true);}catch(e){}
  delete S.members[id];
  renderCheckin();
  toast('멤버를 삭제했어요');
}
function drawCal(){
  const m=view(),set=new Set(m.reads),first=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),today=todayISO();
  $('.cal-h span').textContent=`${calY}년 ${calM+1}월`;
  let h='';for(let i=0;i<first;i++)h+='<div class="cell pad"></div>';
  for(let d=1;d<=dim;d++){const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const r=set.has(iso)&&iso<=today,t=iso===today,tap=isMe()&&D(iso)<=D(today);
    h+=`<div class="cell ${r?'read':''} ${t?'today':''} ${tap?'tap':''}" data-d="${iso}"><span>${d}</span></div>`;}
  $('#grid').innerHTML=h;
  if(isMe())$('#grid').querySelectorAll('.tap').forEach(c=>c.onclick=()=>toggleRead(c.dataset.d));
  $('#peerCals')&&($('#peerCals').innerHTML=Object.values(S.members).filter(x=>x.id!==S.meId).map(miniCalHTML).join(''));
  $('#peerCals')&&$('#peerCals').querySelectorAll('.peer-cal').forEach(el=>el.onclick=()=>{S.viewId=el.dataset.id;go('shelf');});
  $('#peerCals')&&$('#peerCals').querySelectorAll('.peer-del').forEach(b=>b.onclick=(e)=>{e.stopPropagation();removePeer(b.dataset.del);});
}
async function toggleRead(iso){
  const m=me(),i=m.reads.indexOf(iso);
  if(i>=0)m.reads.splice(i,1);else m.reads.push(iso);
  await save();renderCheckin();
}

/* ---------- SHELF ---------- */
let shelfFilter='all', shelfYear='all';
function bookYear(b){ const iso=b.end||b.start; if(!iso)return null; return D(iso).getFullYear(); }
function shelfYears(m){ const ys=new Set(); m.books.forEach(b=>{const y=bookYear(b);if(y)ys.add(y);}); return Array.from(ys).sort((a,b)=>b-a); }
function renderShelf(){
  refreshHeader();
  const m=view(),done=doneBooks(m);
  const years=shelfYears(m);
  if(shelfYear!=='all'&&!years.includes(shelfYear))shelfYear='all';
  $('#s-shelf').innerHTML=`
  <div class="card">
    <div class="sec-t">📚 ${m.name}님의 책장 · 완독 ${done.length}권</div>
    <div class="shelfwrap" id="shelfG"></div>
  </div>
  ${isMe()?`<button class="btn" id="addBook" style="margin-bottom:10px">+ 책 기록하기</button>`:''}
  <button class="btn ghost" id="viewMembers" style="margin-bottom:14px">👥 멤버 책장 보기</button>
  <div class="filters" id="flt">
    <div class="chip ${shelfFilter==='all'?'on':''}" data-f="all">전체</div>
    <div class="chip ${shelfFilter==='reading'?'on':''}" data-f="reading">읽는 중</div>
    <div class="chip ${shelfFilter==='done'?'on':''}" data-f="done">완독</div>
  </div>
  ${years.length?`<div class="yearflt" id="yflt">
    <div class="chip ${shelfYear==='all'?'on':''}" data-y="all">전체 연도</div>
    ${years.map(y=>`<div class="chip ${shelfYear===y?'on':''}" data-y="${y}">${y}년</div>`).join('')}
  </div>`:''}
  <div id="blist"></div>`;
  if(isMe())$('#addBook').onclick=()=>openBookSheet();
  $('#viewMembers').onclick=openMemberPicker;
  $('#flt').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{shelfFilter=c.dataset.f;renderShelf();});
  $('#yflt')&&$('#yflt').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{shelfYear=c.dataset.y==='all'?'all':+c.dataset.y;renderShelf();});
  drawShelf(done);drawBookList();
}
function openMemberPicker(){
  $('#sheet').innerHTML=`<h3>누구의 책장을 볼까요?</h3>
    <div>${Object.values(S.members).map(m=>`
      <div class="row-m" data-id="${m.id}">
        <div class="av">${avatarTiny(m)}</div>
        <div><div class="nm">${m.name}${m.id===S.meId?' <span style="font-size:11px;color:var(--honey-d)">(나)</span>':''}</div>
          <div class="sub">${CH[m.char].label} · 완독 ${doneBooks(m).length}권</div></div>
      </div>`).join('')}</div>
    <button class="btn ghost" id="pickCancel" style="margin-top:8px">닫기</button>`;
  openOv();
  $('#pickCancel').onclick=closeOv;
  $('#sheet').querySelectorAll('.row-m').forEach(r=>r.onclick=()=>{
    S.viewId=r.dataset.id;closeOv();go('shelf');
  });
}
function drawShelf(done){
  const wrap=$('#shelfG');
  if(!done.length){wrap.innerHTML=`<div class="shelf-empty">완독한 책이 책장에 콕콕 꽂혀요 📖<br>첫 책을 기록해보세요</div>
  <div class="board"></div>`;return;}
  const W=wrap.clientWidth||320, per=Math.max(4,Math.floor((W-12)/(34+4)));
  let h='';
  for(let i=0;i<done.length;i+=per){
    const row=done.slice(i,i+per);
    h+='<div class="shelf-row"><div class="books">';
    row.forEach((b,j)=>{
      const idx=i+j+1, col=spineColor(b.title);
      if(b.cover){
        h+=`<div class="book" style="height:${82+ (idx%3)*6}px;animation-delay:${(i+j)*0.04}s"><img src="${b.cover}" onerror="this.parentNode.innerHTML='<div class=spine style=\\'background:${col}\\'>${esc(b.title)}<\\/div>'"></div>`;
      }else{
        h+=`<div class="book" style="height:${82+(idx%3)*6}px;background:${col};animation-delay:${(i+j)*0.04}s"><div class="spine">${esc(b.title)}</div></div>`;
      }
    });
    h+='</div><div class="board"></div></div>';
  }
  wrap.innerHTML=h;
}
function spineColor(t){const cs=['#E24B4A','#5FA17E','#3E7CB1','#F2994A','#9B6BB0','#D98C5F','#5B8C7B','#C0504D'];let s=0;for(const c of t)s+=c.charCodeAt(0);return cs[s%cs.length];}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).slice(0,14);}
function drawBookList(){
  const m=view();let list=m.books.slice().reverse();
  if(shelfFilter==='reading')list=list.filter(b=>!b.end);
  if(shelfFilter==='done')list=list.filter(b=>b.end);
  if(shelfYear!=='all')list=list.filter(b=>bookYear(b)===shelfYear);
  if(!list.length){$('#blist').innerHTML=`<div class="shelf-empty">${shelfYear!=='all'?shelfYear+'년 기록이 없어요':shelfFilter==='reading'?'읽는 중인 책이 없어요':shelfFilter==='done'?'완독한 책이 없어요':'아직 기록한 책이 없어요'}</div>`;return;}
  $('#blist').innerHTML=list.map(b=>`
    <div class="bl" data-id="${b.id}">
      <div class="cv">${b.cover?`<img src="${b.cover}" onerror="this.style.display='none'">`:'📕'}</div>
      <div class="info">
        <b>${b.title}</b><div class="au">${b.author||'저자 미상'}</div>
        <span class="tag ${b.end?'done':'read'}">${b.end?'완독':'읽는 중'}</span>
        <div class="dt">${b.start?'시작 '+fmt(b.start):''}${b.end?' · 완독 '+fmt(b.end):''}</div>
        ${b.end&&b.rating?`<div class="starline">${'★'.repeat(b.rating)}${'☆'.repeat(5-b.rating)}</div>`:''}
        ${b.review?`<div class="review">${esc2(b.review)}</div>`:''}
      </div>
      ${isMe()?`<div class="acts"><button class="edit" data-id="${b.id}" title="제목·날짜 수정">✏️</button><button class="del" data-id="${b.id}">✕</button></div>`:''}
    </div>`).join('');
  $('#blist').querySelectorAll('.bl').forEach(row=>row.onclick=()=>{
    const bk=m.books.find(x=>x.id===row.dataset.id);if(!bk)return;
    if(bk.end)openReviewSheet(bk);
    else if(isMe())openBookSheet(bk);
    else toast('아직 읽는 중인 책이에요');
  });
  if(isMe())$('#blist').querySelectorAll('.edit').forEach(x=>x.onclick=(e)=>{
    e.stopPropagation();
    const bk=me().books.find(b=>b.id===x.dataset.id);if(bk)openBookSheet(bk);
  });
  if(isMe())$('#blist').querySelectorAll('.del').forEach(x=>x.onclick=async(e)=>{
    e.stopPropagation();
    const m=me();m.books=m.books.filter(b=>b.id!==x.dataset.id);await save();renderShelf();
  });
}

/* ---------- book sheet + search ---------- */
let _editId=null,_cover='',_searchT=null;
function openBookSheet(book){
  _editId=book?book.id:null;_cover=book?book.cover||'':'';
  $('#sheet').innerHTML=`
    <h3>${book?'책 수정':'책 기록하기'}</h3>
    <div class="field">
      <label>책 제목</label>
      <input id="bTitle" placeholder="제목 2글자만 입력해도 검색돼요" value="${book?esc2(book.title):''}" autocomplete="off">
      <div class="hint">제목을 입력하면 자동으로 관련 도서를 찾아드려요</div>
    </div>
    <div class="searchres" id="sres" style="display:none"></div>
    <div class="field">
      <label>저자 <span style="font-weight:400">(선택)</span></label>
      <input id="bAuthor" placeholder="비워두어도 괜찮아요" value="${book?esc2(book.author||''):''}" autocomplete="off">
    </div>
    <div class="dates">
      <div class="field"><label>시작일</label><input id="bStart" type="date" value="${book?book.start||'':todayISO()}"></div>
      <div class="field"><label>완독일 <span style="font-weight:400">(비우면 읽는 중)</span></label><input id="bEnd" type="date" value="${book?book.end||'':''}"></div>
    </div>
    <div class="field">
      <label>전체 페이지 <span style="font-weight:400">(검색하면 자동 입력 · 직접 수정 가능)</span></label>
      <input id="bPages" type="number" inputmode="numeric" placeholder="예: 312" value="${book&&book.pages?book.pages:''}">
    </div>
    <div class="btnrow">
      <button class="btn ghost" id="bCancel">취소</button>
      <button class="btn" id="bSave">${book?'저장':'기록하기'}</button>
    </div>`;
  openOv();
  $('#bCancel').onclick=closeOv;
  $('#bSave').onclick=saveBook;
  const ti=$('#bTitle');
  ti.oninput=()=>{clearTimeout(_searchT);const q=ti.value.trim();
    if(q.length<2){$('#sres').style.display='none';return;}
    _searchT=setTimeout(()=>searchBooks(q),320);};
  if(!book)setTimeout(()=>ti.focus(),250);
}
function esc2(s){return (s||'').replace(/"/g,'&quot;');}
async function searchBooks(q){
  const box=$('#sres');box.style.display='block';
  box.innerHTML=`<div class="sr-state">'${q}' 검색 중…</div>`;
  const BOOKS_KEY='AIzaSyC-AC06dno9BRvOCtnKaW7a9TXnFeZhfJI';
  try{
    const url=`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=8&printType=books&langRestrict=ko&country=KR&key=${BOOKS_KEY}`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('http');
    const data=await res.json();
    let items=(data.items||[]);
    if(!items.length){
      const r2=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=8&country=KR&key=${BOOKS_KEY}`);
      if(r2.ok){items=((await r2.json()).items||[]);}
    }
    if(!items.length){box.innerHTML=`<div class="sr-state">검색 결과가 없어요. 제목·저자를 직접 입력해 기록해도 돼요.</div>`;return;}
    box.innerHTML=items.map((it,i)=>{
      const v=it.volumeInfo||{},img=(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||'').replace('http://','https://');
      const au=(v.authors||[]).join(', ');
      return `<div class="sr" data-i="${i}">
        ${img?`<img src="${img}">`:'<div class="ph"></div>'}
        <div><b>${esc(v.title||'')||v.title}</b><small>${au||'저자 미상'}${v.publishedDate?' · '+v.publishedDate.slice(0,4):''}</small></div></div>`;
    }).join('');
    box.querySelectorAll('.sr').forEach(r=>r.onclick=()=>{
      const v=items[+r.dataset.i].volumeInfo||{};

      _cover=((v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail))||'').replace('http://','https://');
      box.style.display='none';
    });
  }catch(e){
    box.innerHTML=`<div class="sr-state">지금은 자동 검색을 쓸 수 없어요. 제목·저자를 직접 입력해 기록하면 됩니다.<br><span style="color:#bbb">(배포 환경에서는 자동 검색이 동작해요)</span></div>`;
  }
}

/* ---------- STATS ---------- */
let statMode='month', statY=null, statM=null;
function memberYears(){ const ys=new Set(); Object.values(S.members).forEach(m=>{m.reads.forEach(r=>ys.add(D(r).getFullYear()));m.books.forEach(b=>{if(b.end)ys.add(D(b.end).getFullYear());});}); ys.add(new Date().getFullYear()); return Array.from(ys).sort((a,b)=>a-b); }
function yearReadDays(m,y){ return m.reads.filter(r=>D(r).getFullYear()===y).length; }
function yearDone(m,y){ return m.books.filter(b=>b.end&&D(b.end).getFullYear()===y).length; }
function renderStats(){
  refreshHeader();
  const m=view(),now=new Date();
  if(statY==null)statY=now.getFullYear();
  if(statM==null)statM=now.getMonth();
  const md=monthDone(m,statY,statM),mr=monthReadDays(m,statY,statM),total=doneBooks(m).length;
  // per-member rows
  const isMonth=statMode==='month';
  const rows=Object.values(S.members).map(mm=>{
    const days=isMonth?monthReadDays(mm,statY,statM):yearReadDays(mm,statY);
    const done=isMonth?monthDone(mm,statY,statM):yearDone(mm,statY);
    return {mm,days,done};
  }).sort((a,b)=>b.days-a.days||b.done-a.done);
  const maxDays=Math.max(1,...rows.map(r=>r.days));
  // personal month-by-month mini chart (selected year)
  const yr=Array.from({length:12},(_,i)=>monthReadDays(m,statY,i));
  const maxYr=Math.max(1,...yr);
  $('#s-stats').innerHTML=`
  <div class="statgrid" style="margin-bottom:14px">
    <div class="stat"><b>${md}</b><span>이번 달 완독</span></div>
    <div class="stat"><b>${mr}</b><span>이번 달 읽은 날</span></div>
    <div class="stat"><b>${total}</b><span>전체 완독</span></div>
    <div class="stat"><b>${streak(m)}</b><span>현재 연속</span></div>
  </div>
  <div class="card">
    <div class="pswitch">
      <div class="pseg">
        <button class="${isMonth?'on':''}" data-mode="month">📅 월별</button>
        <button class="${!isMonth?'on':''}" data-mode="year">🗓️ 연도별</button>
      </div>
      <div class="pnav">
        <button id="pPrev">‹</button>
        <span>${isMonth?`${statY}년 ${statM+1}월`:`${statY}년`}</span>
        <button id="pNext">›</button>
      </div>
    </div>
    <div class="sec-t" style="margin:2px 4px 12px">👥 멤버별 ${isMonth?'읽은 날':'올해 읽은 날'} · 가로 그래프</div>
    ${rows.map(r=>`
      <div class="hbar ${r.mm.id===S.meId?'meBar':''}">
        <div class="av">${avatarTiny(r.mm)}</div>
        <div class="nm">${r.mm.name}</div>
        <div class="track"><i style="width:${(r.days/maxDays*100).toFixed(0)}%"></i></div>
        <div class="val"><b>${r.days}</b>일·완독 ${r.done}</div>
      </div>`).join('')}
  </div>
  <div class="card">
    <div class="sec-t">📊 ${m.name}님 ${statY}년 월별 읽은 날</div>
    <div class="bars">
      ${yr.map((v,i)=>`<div class="b ${statY===now.getFullYear()&&i===now.getMonth()?'cur':''}"><u>${v||''}</u><i style="height:${(v/maxYr*100).toFixed(0)}%"></i><em>${i+1}</em></div>`).join('')}
    </div>
  </div>`;
  $('#s-stats').querySelectorAll('.pseg button').forEach(b=>b.onclick=()=>{statMode=b.dataset.mode;renderStats();});
  $('#pPrev').onclick=()=>{ if(isMonth){statM--;if(statM<0){statM=11;statY--;}} else statY--; renderStats(); };
  $('#pNext').onclick=()=>{ if(isMonth){statM++;if(statM>11){statM=0;statY++;}} else statY++; renderStats(); };
}

function dressItems(){
  if(dressSlot==='cloth')return catBySlot('cloth');
  return CATALOG.filter(i=>ACC_SLOTS.includes(i.slot)); // 악세사리
}
function drawItems(){
  const m=me(),a=age(m),mann=m.char,b=boxes(mann);
  if(dressSlot==='bg'){
    $('#items').innerHTML=BGCOLORS.map(bg=>{
      const sel=(m.bg||'')===bg.hex;
      return `<div class="item bgtile ${sel?'eq':''}" data-bg="${bg.hex}">
        <div class="bgswatch" style="background:${bg.hex||'#FFFFFF'}"></div>
        <div class="nm">${bg.name}</div>
        ${sel?'<div class="chk">✓</div>':''}
      </div>`;
    }).join('');
    $('#items').querySelectorAll('.bgtile').forEach(el=>el.onclick=async()=>{
      const hex=el.dataset.bg; m.bg=hex||null; await save(); renderDress();
    });
    return;
  }
  let h='';
  if(dressSlot==='cloth'){
    const cur=m.items.cloth;
    h+=`<div class="item ${!cur?'on':''}" data-id="" data-slot="cloth"><div class="mini"><div class="b" style="background-image:url(${CH[mann].img})"></div></div><div class="nm">없음</div></div>`;
  }
  dressItems().forEach(it=>{
    const locked=a<it.age, eq=m.items[it.slot]===it.id;
    h+=`<div class="item ${eq?'eq':''}" data-id="${it.id}" data-slot="${it.slot}">
      <div class="mini"><div class="b" style="background-image:url(${CH[mann].img})"></div>
      <svg viewBox="0 0 100 ${b.V.toFixed(1)}">${it.draw(b)}</svg></div>
      <div class="nm">${it.name}</div>
      ${eq?'<div class="chk">✓</div>':''}
      ${locked?`<div class="lock">🔒<br>${it.age}살부터</div>`:''}
    </div>`;
  });
  $('#items').innerHTML=h;
  $('#items').querySelectorAll('.item').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.id, slot=el.dataset.slot;
    if(id){const it=itemById(id);if(age(m)<it.age){toast(it.age+'살부터 입을 수 있어요');return;}}
    if(!id){ if(slot)delete m.items[slot]; }
    else if(m.items[slot]===id) delete m.items[slot];
    else m.items[slot]=id;
    await save();renderDress();
  });
}

let _rtUnsub=null;

function subscribeRealtime(){
  if(!window._fb||_rtUnsub)return;
  const {db,roomId}=window._fb;

  // 오버레이가 열려 있을 때는 화면 갱신을 잠깐 미룸
  const apply=()=>{ 
    if(!$('#ov').classList.contains('on')) syncClub(); 
  };

  const u1=db.collection('rooms').doc(roomId).collection('participants')
    .onSnapshot(()=>apply(), e=>console.warn('participants snapshot',e));

  const u2=db.collection('rooms').doc(roomId)
    .onSnapshot(()=>apply(), e=>console.warn('room snapshot',e));

  _rtUnsub=()=>{u1();u2();};
}

        const code=e&&e.code;
        if(code==='auth/operation-not-allowed'){ if(note)note.innerHTML='⚠️ Firebase 콘솔에서 Google 로그인을 먼저 켜주세요.'; }
        else if(code==='auth/unauthorized-domain'){ if(note)note.innerHTML='⚠️ Firebase 승인된 도메인에 이 주소를 추가해주세요.'; }
        else if(code&&code!=='auth/popup-closed-by-user'&&code!=='auth/cancelled-popup-request'){ if(note)note.innerHTML='로그인에 실패했어요. 잠시 후 다시 시도해주세요.'; }
      }
    };
    firebase.auth().onAuthStateChanged(async user=>{
      if(user){ try{await startAppForUser(user.uid);}catch(e){console.error(e);} }
      else { showLogin(); }
    });
  } else {
    // 비-Firebase(아티팩트 미리보기 등): 기존 흐름 유지
    (async function(){
      await loadClub();
      if(!S.meId||!S.members[S.meId])await migrateLegacy();
      if(!S.meId||!S.members[S.meId]){ showOnboarding();return; }
      boot();
    })();
  }
})();
</script>
</body>
</html>
