/* ---------- STATS ---------- */
let statMode='month', statY=null, statM=null;
function memberYears(){ const ys=new Set(); Object.values(S.members).forEach(m=>{m.reads.forEach(r=>ys.add(D(r).getFullYear()));m.books.forEach(b=>{if(b.end)ys.add(D(b.end).getFullYear());});}); ys.add(new Date().getFullYear()); return Array.from(ys).sort((a,b)=>a-b); }
function yearReadDays(m,y){ return m.reads.filter(r=>D(r).getFullYear()===y).length; }
function yearDone(m,y){ return m.books.filter(b=>b.end&&D(b.end).getFullYear()===y).length; }
function renderStats(){
  refreshHeader();
  const m=view(),now=new Date();
  if(statY==null)statY=now.getFullYear();
  if(statM==null)statM=now.getMonth();
  const md=monthDone(m,statY,statM),mr=monthReadDays(m,statY,statM),total=doneBooks(m).length;
  // per-member rows
  const isMonth=statMode==='month';
  const rows=Object.values(S.members).map(mm=>{
    const days=isMonth?monthReadDays(mm,statY,statM):yearReadDays(mm,statY);
    const done=isMonth?monthDone(mm,statY,statM):yearDone(mm,statY);
    return {mm,days,done};
  }).sort((a,b)=>b.days-a.days||b.done-a.done);
  const maxDays=Math.max(1,...rows.map(r=>r.days));
  // personal month-by-month mini chart (selected year)
  const yr=Array.from({length:12},(_,i)=>monthReadDays(m,statY,i));
  const maxYr=Math.max(1,...yr);
  $('#s-stats').innerHTML=`
  <div class="statgrid" style="margin-bottom:14px">
    <div class="stat"><b>${md}</b><span>이번 달 완독</span></div>
    <div class="stat"><b>${mr}</b><span>이번 달 읽은 날</span></div>
    <div class="stat"><b>${total}</b><span>전체 완독</span></div>
    <div class="stat"><b>${streak(m)}</b><span>현재 연속</span></div>
  </div>
  <div class="card">
    <div class="pswitch">
      <div class="pseg">
        <button class="${isMonth?'on':''}" data-mode="month">📅 월별</button>
        <button class="${!isMonth?'on':''}" data-mode="year">🗓️ 연도별</button>
      </div>
      <div class="pnav">
        <button id="pPrev">‹</button>
        <span>${isMonth?`${statY}년 ${statM+1}월`:`${statY}년`}</span>
        <button id="pNext">›</button>
      </div>
    </div>
    <div class="sec-t" style="margin:2px 4px 12px">👥 멤버별 ${isMonth?'읽은 날':'올해 읽은 날'} · 가로 그래프</div>
    ${rows.map(r=>`
      <div class="hbar ${r.mm.id===S.meId?'meBar':''}">
        <div class="av">${avatarTiny(r.mm)}</div>
        <div class="nm">${r.mm.name}</div>
        <div class="track"><i style="width:${(r.days/maxDays*100).toFixed(0)}%"></i></div>
        <div class="val"><b>${r.days}</b>일·완독 ${r.done}</div>
      </div>`).join('')}
  </div>
  <div class="card">
    <div class="sec-t">📊 ${m.name}님 ${statY}년 월별 읽은 날</div>
    <div class="bars">
      ${yr.map((v,i)=>`<div class="b ${statY===now.getFullYear()&&i===now.getMonth()?'cur':''}"><u>${v||''}</u><i style="height:${(v/maxYr*100).toFixed(0)}%"></i><em>${i+1}</em></div>`).join('')}
    </div>
  </div>`;
  $('#s-stats').querySelectorAll('.pseg button').forEach(b=>b.onclick=()=>{statMode=b.dataset.mode;renderStats();});
  $('#pPrev').onclick=()=>{ if(isMonth){statM--;if(statM<0){statM=11;statY--;}} else statY--; renderStats(); };
  $('#pNext').onclick=()=>{ if(isMonth){statM++;if(statM>11){statM=0;statY++;}} else statY++; renderStats(); };
}

let dressSlot='face', clothTab='all';
const DCATS2=[['face','얼굴'],['hair','헤어'],['cloth','의상'],['acc','악세사리'],['bg','배경']];
function renderDress(){

// 아이템 타일 (미니 프리뷰 + 잠금). preview=합성용 멤버, zoom=미니 줌, locked=잠금여부
function tile(preview,zoom,label,eq,data,it){
  const locked=it&&age(me())<itemAge(it);
  return `<div class="item ${eq?'eq':''} ${locked?'locked':''}" ${data}>
    <div class="mini">${avatarStack(preview,zoom)}</div>
    ${eq?'<div class="chk">✓</div>':''}
    ${locked?`<div class="lock">🔒<br>${itemAge(it)}살부터</div>`:''}
  </div>`;
}
// 슬롯 그리드 (눈/입/헤어 — 교체전용, 없음 옵션 X)
function slotGrid(m,slot,zoom){
  return ITEMS[slot].map(it=>{
    const eq=m.items[slot]===it.id;
    const pv=Object.assign({},m,{items:Object.assign({},m.items,{[slot]:it.id})});
    return tile(pv,zoom,it.name,eq,`data-slot="${slot}" data-id="${it.id}"`,it);
  }).join('');
}
// 악세사리 그리드 (타입별 섹션 — "없음" + 아이템들, 타입마다 1개)
function accTypeGrid(m,t){
  const cur=(m.items.acc&&m.items.acc[t.key])||'';
  const none=(()=>{const acc=Object.assign({},m.items.acc,{[t.key]:null});const pv=Object.assign({},m,{items:Object.assign({},m.items,{acc})});
    return tile(pv,'hz','없음',!cur,`data-acc="${t.key}" data-id=""`,null);})();
  const items=t.items.map(it=>{
    const eq=cur===it.id;
    const acc=Object.assign({},m.items.acc,{[t.key]:it.id});
    const pv=Object.assign({},m,{items:Object.assign({},m.items,{acc})});
    return tile(pv,'hz',it.name,eq,`data-acc="${t.key}" data-id="${it.id}"`,it);
  }).join('');
  return `<div class="dsec">${t.name}</div>${none}${items}`;
}
function accGrid(m){
  return ACC_TYPES.filter(t=>!FACE_EXTRA_KEYS.includes(t.key)).map(t=>accTypeGrid(m,t)).join('');
}
function faceExtraGrid(m){
  return ACC_TYPES.filter(t=>FACE_EXTRA_KEYS.includes(t.key)).map(t=>accTypeGrid(m,t)).join('');
}
function drawItems(){
  const m=me(); $('#dsub').innerHTML='';
  if(dressSlot==='bg'){
    $('#items').innerHTML=BGCOLORS.map(bg=>{
      const sel=(m.bg||'')===bg.hex;
      return `<div class="item bgtile ${sel?'eq':''}" data-bg="${bg.hex}">
        <div class="bgswatch" style="background:${bg.hex||'#FFFFFF'}"></div>
        <div class="nm">${bg.name}</div>${sel?'<div class="chk">✓</div>':''}</div>`;
    }).join('');
    $('#items').querySelectorAll('.bgtile').forEach(el=>el.onclick=async()=>{m.bg=el.dataset.bg||null;await save();renderDress();});
    return;
  }
  if(dressSlot==='hair'){ $('#items').innerHTML=slotGrid(m,'hair','hz'); }
  else if(dressSlot==='face'){ $('#items').innerHTML=`<div class="dsec">눈</div>${slotGrid(m,'eyes','hz')}<div class="dsec">입</div>${slotGrid(m,'mouth','hz')}${faceExtraGrid(m)}`; }
  else if(dressSlot==='cloth'){
    $('#dsub').innerHTML=`<div class="dsub">
      <div class="t ${clothTab==='all'?'on':''}" data-t="all">전체</div>
      <div class="t ${clothTab==='top'?'on':''}" data-t="top">상의</div>
      <div class="t ${clothTab==='bottom'?'on':''}" data-t="bottom">하의</div></div>`;
    $('#dsub').querySelectorAll('.t').forEach(t=>t.onclick=()=>{clothTab=t.dataset.t;drawItems();});
    $('#items').innerHTML = clothTab==='all'
      ? `<div class="dsec">상의</div>${slotGrid(m,'cloth_top',null)}<div class="dsec">하의</div>${slotGrid(m,'cloth_bottom',null)}`
      : slotGrid(m, clothTab==='top'?'cloth_top':'cloth_bottom', null);
  }
  else if(dressSlot==='acc'){ $('#items').innerHTML=accGrid(m); }

  // 클릭 핸들러
  $('#items').querySelectorAll('.item[data-slot]').forEach(el=>el.onclick=async()=>{
    if(el.classList.contains('locked'))return;
    const slot=el.dataset.slot,id=el.dataset.id||null;
    if(m.items[slot]===id||(!id&&!m.items[slot]))return;
    m.items[slot]=id; await save(); renderDress();
  });
  $('#items').querySelectorAll('.item[data-acc]').forEach(el=>el.onclick=async()=>{
    if(el.classList.contains('locked'))return;
    const t=el.dataset.acc,id=el.dataset.id||null;
    if(!m.items.acc)m.items.acc={};
    if((m.items.acc[t]||null)===id)return;
    m.items.acc[t]=id; await save(); renderDress();
  });
}

/* ---------- 접속 표시(presence) + 알림(notifications) ---------- */
window._online=window._online||new Set();
window._presenceAt=window._presenceAt||{};
const ONLINE_WINDOW=75000;   // 마지막 신호 75초 이내면 접속 중
const HEARTBEAT=30000;       // 30초마다 접속 신호

function recomputeOnline(){
  const map=window._presenceAt||{},now=Date.now(),on=new Set();
  Object.keys(map).forEach(id=>{ if(now-(map[id]||0)<ONLINE_WINDOW) on.add(id); });
  if(S&&S.meId) on.add(S.meId);   // 나 자신은 항상 접속 중
  window._online=on;
  applyPresenceDots();
  // 모임 탭 접속 인원수 갱신
  if(tab==='club'){ const co=$('#s-club .club-online'); if(co){ const n=Array.from(on).filter(id=>S.members&&S.members[id]).length; co.textContent='● '+n+'명 접속'; } }
}
function applyPresenceDots(){
  const on=window._online||new Set();
  document.querySelectorAll('.odot[data-uid]').forEach(d=>d.classList.toggle('is-online',on.has(d.getAttribute('data-uid'))));
}
function startPresence(){
  if(!window._fb||window._presenceStarted||!S||!S.meId)return;
  window._presenceStarted=true;
  const {db,roomId}=window._fb;
  const presCol=db.collection('rooms').doc(roomId).collection('presence');
  const beat=()=>{ if(S&&S.meId) presCol.doc(S.meId).set({at:Date.now()},{merge:true}).catch(()=>{}); };
  beat();
  recomputeOnline();   // 내 접속을 즉시 반영(스냅샷 도착 전에도 내 점 표시)
  window._presHB=setInterval(beat,HEARTBEAT);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) beat(); });
  window.addEventListener('focus',beat);
  window.addEventListener('pagehide',()=>{ try{ if(S&&S.meId) presCol.doc(S.meId).set({at:0},{merge:true}); }catch(e){} });
  presCol.onSnapshot(qs=>{
    const map={}; qs.forEach(d=>{ map[d.id]=(d.data()&&d.data().at)||0; });
    window._presenceAt=map; recomputeOnline();
  },e=>console.warn('presence snapshot',e));
  window._presTick=setInterval(recomputeOnline,20000);   // 신호 끊긴 멤버 자동 오프라인 처리
}

/* --- 알림 --- */
function notifKey(){ return 'kkudok::notif::'+(window._kkRoom||'main')+'::'+((S&&S.meId)||'?'); }
function initNotif(){
  if(window._notif&&window._notif._wired)return;
  let saved={list:[],unread:0};
  try{ const raw=localStorage.getItem(notifKey()); if(raw)saved=JSON.parse(raw)||saved; }catch(e){}
  window._notif=Object.assign({seenPosts:new Set(),doneKey:new Set(),ready:false,list:[],unread:0,_wired:true},
    {list:Array.isArray(saved.list)?saved.list:[],unread:saved.unread||0});
  const btn=document.getElementById('bellBtn');
  if(btn) btn.onclick=openNotifSheet;
  updateBellBadge();
}
function saveNotif(){
  const N=window._notif; if(!N)return;
  try{ localStorage.setItem(notifKey(),JSON.stringify({list:N.list.slice(0,50),unread:N.unread})); }catch(e){}
}
function updateBellBadge(){
  const b=document.getElementById('bellBadge'); if(!b)return;
  const n=(window._notif&&window._notif.unread)||0;
  if(n>0){ b.hidden=false; b.textContent=n>99?'99+':String(n); } else b.hidden=true;
}
function scanNotifications(){
  if(!window._notif) initNotif();
  const N=window._notif;
  const curPosts=new Set((S.posts||[]).map(p=>p.id));
  const curDone=new Set();
  Object.values(S.members).forEach(m=>(m.books||[]).forEach(b=>{ if(b.end) curDone.add(m.id+'::'+b.id); }));
  if(!N.ready){ N.seenPosts=curPosts; N.doneKey=curDone; N.ready=true; return; }  // 첫 로드는 기준선만
  // 삭제된 글의 알림은 알림 목록에서도 제거
  if(N.list&&N.list.length){
    const before=N.list.length;
    let removedUnread=0;
    N.list=N.list.filter(ev=>{
      if(ev.type==='post'){ const pid=ev.id.slice(2); if(!curPosts.has(pid)){ if(!ev.read)removedUnread++; return false; } }
      return true;
    });
    if(N.list.length!==before){ N.unread=Math.max(0,(N.unread||0)-removedUnread); saveNotif(); updateBellBadge(); }
  }
  const events=[];
  (S.posts||[]).forEach(p=>{
    if(p.id&&!N.seenPosts.has(p.id)&&p.authorId!==S.meId){
      const au=S.members[p.authorId];
      events.push({id:'p_'+p.id,type:'post',name:au?au.name:'멤버',text:(p.text||'').slice(0,60),ts:p.createdAt||Date.now()});
    }
  });
  Object.values(S.members).forEach(m=>{
    if(m.id===S.meId)return;
    (m.books||[]).forEach(b=>{
      const k=m.id+'::'+b.id;
      if(b.end&&!N.doneKey.has(k)) events.push({id:'d_'+k,type:'done',uid:m.id,name:m.name,text:b.title||'',ts:b.lastTs||Date.now()});
    });
  });
  N.seenPosts=curPosts; N.doneKey=curDone;
  if(events.length) pushNotifs(events);
}
function pushNotifs(events){
  const N=window._notif;
  events.sort((a,b)=>(b.ts||0)-(a.ts||0));
  const exist=new Set(N.list.map(x=>x.id));
  let added=0;
  events.forEach(ev=>{ if(!exist.has(ev.id)){ N.list.unshift(Object.assign({read:false},ev)); added++; } });
  if(!added)return;
  N.list=N.list.slice(0,50);
  N.unread+=added;
  saveNotif(); updateBellBadge();
  const top=events[0];
  const msg=top.type==='post'?`${top.name}님이 새 문장을 올렸어요 ✨`:`${top.name}님이 «${top.text}» 완독했어요 📚`;
  toast(msg);
  try{
    if('Notification'in window&&Notification.permission==='granted'&&document.hidden)
      new Notification('꾸독',{body:msg,icon:ASSETS.logo,tag:'kkudok'});
  }catch(e){}
}
function openNotifSheet(){
  initNotif();
  if('Notification'in window&&Notification.permission==='default'){ try{Notification.requestPermission();}catch(e){} }
  const N=window._notif;
  const rows=N.list.length?N.list.map(ev=>`
    <div class="nti ${ev.read?'':'unread'}" data-type="${ev.type}" data-uid="${ev.uid||''}">
      <div class="ic ${ev.type}">${ev.type==='post'?'✨':'📚'}</div>
      <div class="body">
        <div class="tt"><b>${escT(ev.name)}</b>${ev.type==='post'?'님의 새 문장':'님 완독'}</div>
        <div class="sub">${escT(ev.text)||(ev.type==='post'?'피드에서 확인해요':'책장에 꽂혔어요')}</div>
      </div>
      <div class="ago">${timeAgo(ev.ts)}</div>
    </div>`).join(''):`<div class="nti-empty">아직 새 소식이 없어요 🔔<br>친구들이 글을 올리거나 완독하면 여기에 떠요</div>`;
  $('#sheet').innerHTML=`<h3>알림</h3>${rows}
    <button class="btn ghost" id="ntClose" style="margin-top:12px">닫기</button>`;
  openOv();
  $('#ntClose').onclick=closeOv;
  $('#sheet').querySelectorAll('.nti').forEach(el=>el.onclick=()=>{
    closeOv();
    if(el.dataset.type==='done'){
      const uid=el.dataset.uid;
      if(uid&&S.members[uid]){S.viewId=uid;go('shelf');return;}
    }
    go(el.dataset.type==='post'?'feed':'shelf');
  });
  N.list.forEach(ev=>ev.read=true); N.unread=0; saveNotif(); updateBellBadge();
}



/* ---------- boot ---------- */
let _rtUnsub=null;

function subscribeRealtime(){
  if(!window._fb||_rtUnsub)return;
  const {db,roomId}=window._fb;

  // 오버레이가 열려 있을 때는 화면 갱신을 잠깐 미룸
  const apply=()=>{ 
    if(!$('#ov').classList.contains('on')) syncClub(); 
  };

  const u1=db.collection('rooms').doc(roomId).collection('participants')
    .onSnapshot(()=>apply(), e=>console.warn('participants snapshot',e));

  const u2=db.collection('rooms').doc(roomId)
    .onSnapshot(()=>apply(), e=>console.warn('room snapshot',e));

  const u3=db.collection('rooms').doc(roomId).collection('posts')
    .onSnapshot(()=>apply(), e=>console.warn('posts snapshot',e));

  _rtUnsub=()=>{u1();u2();u3();};
}

function boot(){
  refreshHeader();renderTabs();go('home');
  subscribeRealtime();
  initNotif();updateBellBadge();
  startPresence();
}
  
function showOnboarding(){
  onbChar=null;
  renderCharpick();checkOnb();
  $('#onb').classList.add('on');
}

/* ---------- auth (Google) ---------- */
window._authUid=null;
function showLogin(){
  try{document.getElementById('loginLogo').src=ASSETS.logo;}catch(e){}
  $('#login').classList.add('on');
}
async function startAppForUser(uid){
  window._authUid=uid;
  // 구글 계정(uid)을 회원 식별자로 사용 → 기기 바꿔도 같은 계정이면 동일 회원
  try{localStorage.setItem('kkudok::myid::'+(window._kkRoom||'main'),uid);}catch(e){}

  await loadClub();
  $('#login').classList.remove('on');

  if(S.meId===uid && S.members[uid]){ boot(); }   // 기존 회원 → 홈
  else { showOnboarding(); }                       // 신규 → 온보딩
}

(function(){
  const hasAuth=!!(window._fb && window.firebase && firebase.auth);
  if(hasAuth){
    showLogin();
    const btn=document.getElementById('googleBtn');
    if(btn) btn.onclick=async()=>{
      const note=document.getElementById('loginNote');
      try{
        const p=new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(p);
      }catch(e){
        console.warn('google sign-in',e);
        const code=e&&e.code;
        if(code==='auth/operation-not-allowed'){ if(note)note.innerHTML='⚠️ Firebase 콘솔에서 Google 로그인을 먼저 켜주세요.'; }
        else if(code==='auth/unauthorized-domain'){ if(note)note.innerHTML='⚠️ Firebase 승인된 도메인에 이 주소를 추가해주세요.'; }
        else if(code&&code!=='auth/popup-closed-by-user'&&code!=='auth/cancelled-popup-request'){ if(note)note.innerHTML='로그인에 실패했어요. 잠시 후 다시 시도해주세요.'; }
      }
    };
    firebase.auth().onAuthStateChanged(async user=>{
      if(user){ try{await startAppForUser(user.uid);}catch(e){console.error(e);} }
      else { showLogin(); }
    });
  } else {
    // 비-Firebase(아티팩트 미리보기 등): 기존 흐름 유지
    (async function(){
      await loadClub();
      if(!S.meId||!S.members[S.meId])await migrateLegacy();
      if(!S.meId||!S.members[S.meId]){ showOnboarding();return; }
      boot();
    })();
  }
})();
</script>
